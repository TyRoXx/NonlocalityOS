[toolchain]
# We need nightly for fuzzing (error on stable-2026-05-28: "error: the option `Z` is only accepted on the nightly compiler").
channel = "nightly-2026-05-01"
components = ["rustfmt", "clippy", "cargo", "rustc", "llvm-tools-preview"]
targets = ["x86_64-pc-windows-msvc", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]
profile = "minimal"
