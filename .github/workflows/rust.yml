name: Rust2

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  # https://github.com/mozilla/sccache/blob/main/docs/GHA.md
  SCCACHE_GHA_ENABLED: on
  SCCACHE_VERSION: "v0.14.0"
  SCCACHE_FILENAME: "sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz"
  RUSTC_WRAPPER: sccache
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Rust3
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      # https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/control-workflow-concurrency
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.task }}
      # Changed from true in an attempt to make Actions work on Copilot PRs
      cancel-in-progress: false
    strategy:
      # https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations
      matrix:
        task: [ cargo_test, cargo_lint, cargo_fuzz ]

    steps:
    - uses: actions/checkout@v4
    - name: Setup sccache
      uses: ./.github/actions/setup_sccache
      with:
        version: ${{ env.SCCACHE_VERSION }}
        filename: ${{ env.SCCACHE_FILENAME }}

    - name: Cache Rust toolset
      uses: actions/cache@v4
      with:
        path: |
          ~/.rustup
        key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/rust-toolchain.toml') }}

    - name: Cache Cargo output
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
          target/
          target-coverage/
        # separate cache entries for different tasks because they run in parallel and product different cache contents
        key: cargo-${{ matrix.task }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock', 'scripts/install_cargo-tarpaulin.sh', 'scripts/coverage.sh', 'scripts/build_fuzz.sh', '**/rust-toolchain.toml') }}

    ########################
    # task cargo_test begin
    - name: Run tests with coverage
      if: matrix.task == 'cargo_test'
      run: ./coverage.sh

    - name: Coveralls
      if: matrix.task == 'cargo_test'
      uses: coverallsapp/github-action@v2
      with:
        file: target-coverage/lcov.info
        format: lcov
    # task cargo_test end
    ######################

    ########################
    # task cargo_lint begin
    - name: Check code linting
      if: matrix.task == 'cargo_lint'
      run: ./clippy.sh

    - name: Check code formatting
      if: matrix.task == 'cargo_lint'
      run: cargo fmt --all -- --check
    # task cargo_lint end
    ######################

    ########################
    # task cargo_fuzz begin
    - name: Fuzzing
      if: matrix.task == 'cargo_fuzz'
      run: ./quick_fuzzing.sh
    # task cargo_fuzz end
    ######################

    - name: sccache stats
      run: sccache --show-adv-stats

  leptos_frontend:
    name: Leptos frontend (wasm + trunk)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup sccache
        uses: ./.github/actions/setup_sccache
        with:
          version: ${{ env.SCCACHE_VERSION }}
          filename: ${{ env.SCCACHE_FILENAME }}

      - name: Cache Rust toolset
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
          key: rust-wasm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/rust-toolchain.toml') }}

      # dtolnay/rust-toolchain requires an explicit `toolchain`; keep channel in sync via rust-toolchain.toml
      - name: Parse rust-toolchain channel
        id: rust_toolchain
        run: |
          channel=$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Install Rust (wasm32 + toolchain from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo output (frontend)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-leptos-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock', '**/rust-toolchain.toml', 'download_manager_frontend/**') }}

      - name: Install trunk (only if missing)
        run: |
          if command -v trunk >/dev/null 2>&1; then
            echo "trunk already installed"
          else
            cargo install trunk --locked
          fi

      - name: Trunk build
        working-directory: download_manager_frontend
        run: trunk build
